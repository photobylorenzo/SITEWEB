<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur de Liste d'Images | Lorenzo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0a0f1d; color: white; font-family: 'Plus Jakarta Sans', sans-serif; }
        .drop-zone { border: 2px dashed #2067E9; transition: all 0.3s ease; }
        .drop-zone.drag-over { background: rgba(32, 103, 233, 0.1); border-color: #4d8dff; transform: scale(1.02); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="max-w-2xl w-full bg-[#141b2d] p-8 rounded-3xl shadow-2xl border border-gray-800">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black mb-2">Générateur de <span class="text-blue-500">Liste d'Images</span></h1>
            <p class="text-gray-400">Glissez votre dossier de photos ici pour obtenir la ligne à copier dans le <code class="text-blue-400">config.json</code></p>
        </div>

        <!-- ZONE DE DROP -->
        <div id="dropZone" class="drop-zone rounded-2xl p-12 text-center cursor-pointer mb-6">
            <div id="dropContent">
                <i class="fa-solid fa-folder-open text-5xl text-blue-500 mb-4"></i>
                <p class="text-lg font-semibold">Glissez le dossier ici</p>
                <p class="text-sm text-gray-500 mt-2">ou cliquez pour parcourir vos fichiers</p>
            </div>
            <!-- Input caché pour sélectionner le dossier -->
            <input type="file" id="folderInput" webkitdirectory directory multiple class="hidden">
        </div>

        <!-- RÉSULTAT -->
        <div id="resultContainer" class="hidden space-y-4">
            <div class="flex justify-between items-center">
                <span class="text-sm font-bold uppercase text-gray-400">Résultat :</span>
                <button onclick="copyToClipboard()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-1 rounded-full text-xs font-bold transition flex items-center gap-2">
                    <i class="fa-solid fa-copy"></i> Copier le code
                </button>
            </div>
            <div class="relative">
                <textarea id="output" readonly 
                    class="w-full h-40 bg-black/50 text-green-400 p-4 rounded-xl border border-gray-700 font-mono text-sm focus:outline-none focus:border-blue-500 transition"
                ></textarea>
            </div>
            <p id="fileCount" class="text-right text-xs text-gray-500"></p>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const folderInput = document.getElementById('folderInput');
        const output = document.getElementById('output');
        const resultContainer = document.getElementById('resultContainer');
        const fileCount = document.getElementById('fileCount');

        // Ouvrir le sélecteur de dossier au clic sur la zone
        dropZone.addEventListener('click', () => folderInput.click());

        // Gestion du drag & drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('drag-over');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            
            // Récupérer les fichiers du dossier déposé
            const items = e.dataTransfer.items;
            if (items) {
                const files = [];
                for (let i = 0; i < items.length; i++) {
                    const item = items[i].webkitGetAsEntry();
                    if (item) {
                        traverseFileTree(item, files);
                    }
                }
                processFiles(files);
            }
        });

        // Gestion de la sélection classique via bouton
        folderInput.addEventListener('change', (e) => {
            processFiles(Array.from(e.target.files));
        });

        // Fonction pour parcourir les sous-dossiers si besoin
        function traverseFileTree(item, files) {
            if (item.isFile) {
                files.push(item.name);
            } else if (item.isDirectory) {
                let reader = item.createReader();
                reader.readEntries((entries) => {
                    for (let i = 0; i < entries.length; i++) {
                        traverseFileTree(entries[i], files);
                    }
                });
            }
        }

        function processFiles(files) {
            // Filtrer uniquement les extensions d'images
            const imageExtensions = /\.(jpg|jpeg|png|webp|gif)$/i;
            const imageFiles = files
                .filter(file => {
                    // Si c'est un objet File (input) ou un string (drag & drop)
                    const name = typeof file === 'string' ? file : file.name;
                    return imageExtensions.test(name);
                })
                .map(file => {
                    return typeof file === 'string' ? file : file.name;
                })
                .sort(); // Trier par nom

            if (imageFiles.length === 0) {
                alert("Aucune image trouvée dans ce dossier !");
                return;
            }

            // Générer le format JSON
            const jsonLine = ` "images": ${JSON.stringify(imageFiles, null, 2).replace(/\n/g, '')},`;
            
            output.value = jsonLine;
            fileCount.innerText = `${imageFiles.length} images détectées.`;
            resultContainer.classList.remove('hidden');
        }

        async function copyToClipboard() {
            try {
                await navigator.clipboard.writeText(output.value);
                const btn = document.querySelector('button[onclick="copyToClipboard()"]');
                btn.innerHTML = '<i class="fa-solid fa-check"></i> Copié !';
                btn.classList.replace('bg-blue-600', 'bg-green-600');
                
                setTimeout(() => {
                    btn.innerHTML = '<i class="fa-solid fa-copy"></i> Copier le code';
                    btn.classList.replace('bg-green-600', 'bg-blue-600');
                }, 2000);
            } catch (err) {
                alert("Erreur lors de la copie");
            }
        }
    </script>
</body>
</html>
